name = "never-forget"
main = "src/index.ts"
compatibility_date = "2024-01-17"

# 定时触发器：每分钟执行一次
[triggers]
crons = ["* * * * *"]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "reminder-db"
database_id = "your_d1_database_id"

# 环境变量（非敏感）
[vars]
# Worker 自身的基础 URL（用于兼容旧配置）
WORKER_BASE_URL = "https://reminder.your-domain.com"
# 外部推送服务地址 (go-wxpush)
# ⚠️ 重要：CF Workers 无法访问 HTTP 协议的直接 IP 地址（会被 Cloudflare 拦截返回 error code: 1003）
# 必须使用 HTTPS + 域名的方式
PUSH_SERVICE_URL = "https://push.your-domain.com"
# 旧版兼容（保留但不再使用）
DEFAULT_PUSH_URL = "https://push.your-domain.com/wxsend"
TIMEZONE = "Asia/Shanghai"

# 开发环境配置
[dev]
port = 8787
local_protocol = "http"
