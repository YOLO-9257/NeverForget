name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build Worker
      run: npm run build
      env:
        NODE_OPTIONS: --max_old_space_size=4096

    - name: Test Worker
      run: npm test

    - name: Build Admin
      run: |
        cd admin
        npm ci
        npm run build
